<!DOCTYPE html>
<!--
  TEMPLATE: Competency Report (A4). End-of-course summary of what the learner
  can now do, by strand, with a simple competency level and a comment. Useful for
  homeschool records/reviews. NOTE: this is a summary record. A full graded
  "mark & review" of submitted work is produced by the optional Mark-and-review
  build stage, which uses the richer review-document.html template.
-->
<html lang="en-AU">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Competency Report — A4</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700;800&display=swap');
  @page { size:A4; margin:0; } * { margin:0; padding:0; box-sizing:border-box; }
  :root { --accent:#3a5a78; --accent-soft:#e9f0f6; }
  body { font-family:'Lexend',Arial,sans-serif; color:#1a1a1a; background:#e8e8e8; font-size:12pt; }
  .page { width:210mm; min-height:297mm; margin:10mm auto; background:#fff; padding:18mm 20mm; box-shadow:0 4px 20px rgba(0,0,0,0.15); }
  @media print { body{background:#fff;} .page{margin:0;box-shadow:none;} }
  h1 { font-size:22pt; color:var(--accent); } .meta { color:#555; margin-bottom:16px; }
  table { width:100%; border-collapse:collapse; margin:10px 0; font-size:11pt; }
  th { background:var(--accent); color:#fff; text-align:left; padding:8px 10px; }
  td { border:1px solid #cdd8e2; padding:8px 10px; vertical-align:top; }
  tr:nth-child(even) td { background:var(--accent-soft); }
  .comment { border:1.5px solid #cdd8e2; border-radius:10px; padding:12px 16px; margin:14px 0; }
  .next { background:var(--accent-soft); border-radius:10px; padding:12px 16px; }
</style>
</head>
<body>
<div class="page">
  <h1>Competency Report</h1>
  <div class="meta">[Student] &middot; [Course] &middot; [Period]</div>
  <table>
    <tr><th>Strand / skill</th><th>Level</th><th>Evidence</th></tr>
    <tr><td>[skill]</td><td>Emerging / Developing / Secure</td><td>[what they did]</td></tr>
  </table>
  <div class="comment"><strong>Teacher comment:</strong> [strengths, in specific terms].</div>
  <div class="next"><strong>Next-step opportunities:</strong> [concrete recommendations for further learning].</div>
</div>
</body>
</html>
