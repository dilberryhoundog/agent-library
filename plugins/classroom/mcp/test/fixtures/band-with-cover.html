     full-bleed cover. The band tint belongs on the content sheets only. -->

<style>
  .bleed { background: #2d6a4f; color: #fff; }
</style>
</head>
<body>
  <div class="bleed"><h1>Cover Title</h1></div>
  <div class="page annotated"><h2>Lesson</h2><p>Content sheet, which does carry the band.</p></div>
</body></html>
