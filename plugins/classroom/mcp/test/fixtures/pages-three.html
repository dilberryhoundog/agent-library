<!DOCTYPE html>
<!-- Three short .page boxes = exactly three sheets, and no trailing blank. -->
<html lang="en-AU"><head><meta charset="UTF-8"><title>three pages</title></head>
<body>
  <div class="page"><h2>One</h2><p>First.</p></div>
  <div class="page"><h2>Two</h2><p>Second.</p></div>
  <div class="page"><h2>Three</h2><p>Third.</p></div>
</body></html>
