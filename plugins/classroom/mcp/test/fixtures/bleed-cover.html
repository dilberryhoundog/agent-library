<!DOCTYPE html>
<!-- Full-bleed cover, alone. Exactly one sheet, colour to the edge.
     The <h1> keeps its user-agent margin ON PURPOSE: that margin collapsing out
     of the box is what used to push it past the sheet and spill a coloured
     phantom page. -->
<html lang="en-AU"><head><meta charset="UTF-8"><title>bleed cover</title>
<style>.bleed { background: #2d6a4f; color: #fff; }</style>
</head>
<body>
  <div class="bleed"><h1>Cover Title</h1><p>Subtitle</p></div>
</body></html>
