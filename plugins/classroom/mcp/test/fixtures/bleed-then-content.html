<!DOCTYPE html>
<!-- Cover + two content pages = exactly three sheets. The bleed colour must not
     appear on any sheet but the first, and content sheets keep their margins. -->
<html lang="en-AU"><head><meta charset="UTF-8"><title>bleed then content</title>
<style>.bleed { background: #2d6a4f; color: #fff; }</style>
</head>
<body>
  <div class="bleed"><h1>Cover Title</h1><p>Subtitle</p></div>
  <div class="page"><h2>Lesson</h2><p>Content on the first inside sheet.</p></div>
  <div class="page"><h2>Reflection</h2><p>Content on the second inside sheet.</p></div>
</body></html>
